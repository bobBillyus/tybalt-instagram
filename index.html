<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TybaltCapulet | gram</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="border">
    <section class="profile">

        <div class="profile-top">
            <img src="images/tybaltpfp.png" alt="TybaltCapulet">

            <div class="profile-info">
            <h2>TybaltCapulet</h2>
                
            <div class="stats">
                <div>
                    <strong>5</strong>
                    <span>posts</span>
                </div>
                <div>
                    <strong>455</strong>
                    <span>followers</span>
                </div>
                <div>
                    <strong>4</strong>
                    <span>following</span>
                </div>
            </div>
            </div>
        </div>

        <p class="bio">👑Proud Capulet<br>🔥DM me if u wanna battle</p>

        <div class="actions">
        <button class="follow">Follow</button>
        <button class="message">Message</button>
        <button class="icon">Friend</button>
        </div>
        
    </section>

    <div class="post-grid">
        <div class="post"><img src="images/post1.jpg" onclick="openModal(this.src)"></div>
        <div class="post"><img src="images/post2.jpg" onclick="openModal(this.src)"></div>
        <div class="post"><img src="images/post3.jpg" onclick="openModal(this.src)"></div>
        <div class="post"><img src="images/post4.jpg" onclick="openModal(this.src)"></div>
        <div class="post"><img src="images/post5.png" onclick="openModal(this.src)"></div>
    </div>

<div class="modal" id="modal">

    <div class="modal-content">

        <div class="modal-header">
            <img id="modalPfp" src="images/tybaltpfp.png">
            <span id="modalUsername">TybaltCapulet</span>
        </div>

        <div class="modal-image-box">
            <img id="modalImg" src="" alt="Full Post">
        </div>

        <div class="modal-caption" id="modalCaption">
            <p>"Romeo, the hate I bear thee can afford No better term than this: thou art a villain." (3.1)</p>
            <p style="color:  #1a5c8b;">#readyforbattle #getreadytogetrekt</p>
        </div>

    </div>

    <span class="close" id="closeBtn">&times;</span>
</div>

    <script src="scripts.js"></script>
</body>
</html>
